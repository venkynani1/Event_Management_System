spring.application.name=event-control-hub

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/maverick_event_control}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:5173,http://127.0.0.1:5173}
